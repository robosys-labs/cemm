name: v3.5 architecture

on:
  pull_request:
    paths:
      - "cemm/v350/**"
      - "cemm/v347/**"
      - "cemm/data/v347/**"
      - "cemm/data/v350/**"
      - "tests/v350/**"
      - "tests/test_v347_*.py"
      - "tools/check_v350_architecture.py"
      - "tools/compile_v350_data.py"
      - "tools/verify_v350_foundation.py"
      - "tools/verify_v350_language_grounding.py"
      - "docs/audits/v347-authority-debt.json"
      - "AGENTS.md"
      - "ARCHITECTURE.md"
      - "CORE_LOOP.md"
      - "IMPLEMENTATION_PLAN.md"
      - "ACCEPTANCE_CONTRACT.md"
      - "docs/architecture/**"
      - ".github/workflows/v350-architecture.yml"
  push:
    branches: [main]
    paths:
      - "cemm/v350/**"
      - "cemm/v347/**"
      - "cemm/data/v347/**"
      - "cemm/data/v350/**"
      - "tests/v350/**"
      - "tests/test_v347_*.py"
      - "tools/check_v350_architecture.py"
      - "tools/compile_v350_data.py"
      - "tools/verify_v350_foundation.py"
      - "tools/verify_v350_language_grounding.py"
      - "docs/audits/v347-authority-debt.json"
      - "AGENTS.md"
      - "ARCHITECTURE.md"
      - "CORE_LOOP.md"
      - "IMPLEMENTATION_PLAN.md"
      - "ACCEPTANCE_CONTRACT.md"
      - "docs/architecture/**"
      - ".github/workflows/v350-architecture.yml"

permissions:
  contents: read

jobs:
  architecture:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"
      - name: Enforce v3.5 prohibitions and legacy-debt ratchet
        run: python tools/check_v350_architecture.py
      - name: Verify Phases 0 through 8
        run: pytest -q tests/v350
      - name: Audit and competence-test the foundational seed
        run: python tools/verify_v350_foundation.py
      - name: Audit language evidence and joint grounding
        run: python tools/verify_v350_language_grounding.py
      - name: Prove deterministic boot compilation
        run: |
          python tools/compile_v350_data.py --output /tmp/v350-a.sqlite --writable
          python tools/compile_v350_data.py --output /tmp/v350-b.sqlite --writable
          cmp /tmp/v350-a.sqlite /tmp/v350-b.sqlite
      - name: Run complete repository suite
        run: pytest -q
