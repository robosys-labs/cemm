name: v3.5 architecture and release authority

on:
  pull_request:
    paths:
      - "cemm/**"
      - "tests/v350/**"
      - "tools/**v350**"
      - "AGENTS.md"
      - "ARCHITECTURE.md"
      - "CORE_LOOP.md"
      - "IMPLEMENTATION_PLAN.md"
      - "ACCEPTANCE_CONTRACT.md"
      - "docs/architecture/**"
      - "pyproject.toml"
      - ".github/workflows/v350-architecture.yml"
  push:
    branches: [main]
    paths:
      - "cemm/**"
      - "tests/v350/**"
      - "tools/**v350**"
      - "AGENTS.md"
      - "ARCHITECTURE.md"
      - "CORE_LOOP.md"
      - "IMPLEMENTATION_PLAN.md"
      - "ACCEPTANCE_CONTRACT.md"
      - "docs/architecture/**"
      - "pyproject.toml"
      - ".github/workflows/v350-architecture.yml"

permissions:
  contents: read

jobs:
  architecture-and-cutover:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"
      - name: Build canonical boot artifact
        run: |
          mkdir -p cemm/data/v350/release
          python tools/compile_v350_data.py \
            --output cemm/data/v350/release/boot.sqlite \
            --writable
      - name: Build exact-commit verification report
        run: |
          python tools/build_v350_verification_report.py \
            --release-commit "$GITHUB_SHA" \
            --boot-db cemm/data/v350/release/boot.sqlite \
            --output cemm/data/v350/release/verification_report.json
      - name: Generate activation-ready runtime authority manifest
        run: |
          python tools/build_v350_runtime_authority_manifest.py \
            --release-commit "$GITHUB_SHA" \
            --boot-db cemm/data/v350/release/boot.sqlite \
            --verification-report cemm/data/v350/release/verification_report.json \
            --output cemm/data/v350/runtime_authority_manifest.json \
            --activate
      - name: Verify final signed Stage-0..22 runtime authority
        run: |
          python tools/verify_v350_phase20.py \
            --manifest cemm/data/v350/runtime_authority_manifest.json \
            --boot-db cemm/data/v350/release/boot.sqlite \
            --verification-report cemm/data/v350/release/verification_report.json
      - name: Build and quarantine-check final runtime wheel
        run: |
          rm -rf dist && mkdir -p dist
          python -m pip wheel . --no-deps --no-build-isolation -w dist
          WHEEL="$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$WHEEL"
          python tools/verify_v350_phase20.py \
            --manifest cemm/data/v350/runtime_authority_manifest.json \
            --boot-db cemm/data/v350/release/boot.sqlite \
            --verification-report cemm/data/v350/release/verification_report.json \
            --wheel "$WHEEL"
      - uses: actions/upload-artifact@v4
        with:
          name: cemm-v350-release-authority-${{ github.sha }}
          path: |
            cemm/data/v350/runtime_authority_manifest.json
            cemm/data/v350/release/boot.sqlite
            cemm/data/v350/release/verification_report.json
            dist/*.whl
